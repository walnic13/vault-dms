name: Azure Static Web Apps CI/CD (main)

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # Bake VITE_* vars at build time. Use the *_MAIN secrets so prod can point at the prod func-dms.
      - name: Create .env for Vite build (from GitHub Secrets)
        shell: bash
        run: |
          cat > .env <<EOF
          VITE_DMS_API_BASE_URL=https://vaultgpt-func-dms.azurewebsites.net
          VITE_DMS_REALTIME_BASE_URL=https://vaultgpt-func-chat.azurewebsites.net
          VITE_ENTRA_CLIENT_ID=${{ secrets.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID=${{ secrets.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_AUTHORITY=${{ secrets.VITE_ENTRA_AUTHORITY }}
          VITE_ENTRA_API_SCOPE=${{ secrets.VITE_ENTRA_API_SCOPE }}
          EOF

      - name: Deploy to Azure Static Web Apps (main)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MAIN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"
          production_branch: "main"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MAIN }}
          action: "close"
          production_branch: "main"
